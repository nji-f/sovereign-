<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SovereignVault //by enji</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="sovereignVault()" x-init="init()" @keydown.escape.window="closeModals()">

    <div class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] flex items-center justify-center pointer-events-none">
        <div class="island-base glass flex items-center justify-center overflow-hidden shadow-2xl"
             :class="islandStatus === 'active' ? 'island-expanded' : (islandStatus === 'secure' ? 'island-secure' : '')">
            <div x-show="islandStatus !== 'idle'" x-transition class="flex items-center gap-4 px-6">
                <i :data-lucide="islandIcon" class="w-5 h-5"></i>
                <span class="text-[11px] font-extrabold uppercase tracking-widest" x-text="islandMsg"></span>
            </div>
            <div x-show="islandStatus === 'idle'" class="opacity-20 flex items-center gap-2">
                <div class="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-pulse"></div>
                <span class="text-[9px] font-black uppercase tracking-[0.3em]">Vault</span>
            </div>
        </div>
    </div>

    <template x-if="focusMode">
        <div class="fixed inset-0 z-[200] bg-neutral-950/90 backdrop-blur-2xl p-10 overflow-y-auto animate__animated animate__fadeIn">
            <button @click="focusMode = false" class="fixed top-8 right-8 p-3 glass rounded-full hover:bg-white hover:text-black transition-all"><i data-lucide="x" class="w-6 h-6"></i></button>
            <div class="max-w-4xl mx-auto mt-10">
                <h2 class="text-4xl font-black mb-6 text-cyan-400" x-text="focusedEntry.title"></h2>
                <div class="glass p-10 rounded-3xl border-neutral-800">
                    <template x-if="focusedEntry.type === 'code'">
                        <pre class="code-font text-sm text-neutral-300 whitespace-pre-wrap" x-text="focusedEntry.content"></pre>
                    </template>
                    <template x-if="focusedEntry.type === 'text'">
                        <div class="markdown-content text-lg leading-relaxed" x-html="marked.parse(focusedEntry.content)"></div>
                    </template>
                </div>
            </div>
        </div>
    </template>

    <template x-if="previewMode">
        <div class="fixed inset-0 z-[200] bg-black/90 backdrop-blur-md p-6 animate__animated animate__zoomIn flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2"><div class="w-3 h-3 bg-red-500 rounded-full"></div><div class="w-3 h-3 bg-yellow-500 rounded-full"></div><div class="w-3 h-3 bg-green-500 rounded-full"></div><span class="ml-4 text-xs font-bold text-neutral-500 tracking-widest uppercase">Live Sandbox</span></div>
                <button @click="previewMode = false" class="p-2 text-neutral-500 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="flex-1 bg-white rounded-2xl overflow-hidden shadow-2xl">
                <iframe :srcdoc="previewHtml" class="w-full h-full border-none"></iframe>
            </div>
        </div>
    </template>

    <div class="max-w-7xl mx-auto px-6 pb-20">
        <nav class="flex justify-between items-center py-10 border-b border-neutral-900/50 mb-8">
            <div class="flex flex-col">
                <h1 class="text-2xl font-black italic tracking-tighter">SOVEREIGN<span class="text-cyan-500">VAULT</span></h1>
                <div class="flex items-center gap-2 text-[9px] font-bold text-neutral-600 tracking-widest uppercase">
                    <i data-lucide="cpu" class="w-3 h-3 text-cyan-500"></i> created by enji
                </div>
            </div>
            <div class="flex items-center gap-3 md:gap-6">
                <button @click="toggleSync()" class="flex items-center gap-2 px-4 py-2 rounded-full border border-neutral-800 transition-all" :class="isSynced ? 'bg-cyan-900/20 text-cyan-400' : 'text-neutral-500 hover:text-white'">
                    <i data-lucide="cloud" class="w-4 h-4"></i>
                    <span class="text-[10px] font-black hidden md:block" x-text="isSynced ? 'SYNCED' : 'LOCAL'"></span>
                </button>
                <div class="w-px h-6 bg-neutral-800 hidden md:block"></div>
                <button @click="exportData()" class="p-3 glass rounded-full hover:text-cyan-400 transition-all"><i data-lucide="download" class="w-4 h-4"></i></button>
                <button @click="scrollToForm()" class="bg-white text-black px-6 md:px-8 py-3 rounded-full text-[10px] font-black tracking-widest hover:scale-105 active:scale-95 transition-all hidden md:block">NEW ENTRY</button>
            </div>
        </nav>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <aside id="snippet-form" class="lg:col-span-4 lg:sticky lg:top-10 h-fit">
                <div class="glass p-8 rounded-[2.5rem] space-y-6 transition-all duration-300"
                     @dragover.prevent="dragActive = true"
                     @dragleave.prevent="dragActive = false"
                     @drop.prevent="handleFileDrop($event)"
                     :class="dragActive ? 'drag-active scale-[1.02]' : 'border-neutral-800'">
                    
                    <div x-show="dragActive" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-cyan-950/80 backdrop-blur-sm rounded-[2.5rem] border-2 border-dashed border-cyan-400 pointer-events-none">
                        <i data-lucide="file-down" class="w-12 h-12 text-cyan-400 mb-2 animate-bounce"></i>
                        <p class="text-xs font-black tracking-widest text-cyan-100 uppercase">Drop to Read File</p>
                    </div>

                    <div class="space-y-4">
                        <input x-model="newEntry.title" type="text" placeholder="Entry Title..." class="w-full bg-transparent border-b border-neutral-800 py-3 focus:outline-none focus:border-cyan-500 transition-all text-lg font-bold">
                        
                        <div class="flex items-center justify-between p-1 bg-neutral-900/50 rounded-2xl border border-neutral-800">
                            <button @click="newEntry.type = 'code'" :class="newEntry.type === 'code' ? 'bg-white text-black shadow-lg' : 'text-neutral-500'" class="flex-1 py-2.5 rounded-xl text-[9px] font-black transition-all">CODE</button>
                            <button @click="newEntry.type = 'text'" :class="newEntry.type === 'text' ? 'bg-white text-black shadow-lg' : 'text-neutral-500'" class="flex-1 py-2.5 rounded-xl text-[9px] font-black transition-all">MARKDOWN</button>
                            <button @click="toggleLock()" :class="newEntry.isLocked ? 'bg-red-500 text-white shadow-red-500/20 shadow-lg' : 'text-neutral-500'" class="flex-1 py-2.5 rounded-xl text-[9px] font-black transition-all flex items-center justify-center gap-2">
                                <i :data-lucide="newEntry.isLocked ? 'lock' : 'unlock'" class="w-3 h-3"></i> PRIV
                            </button>
                        </div>

                        <div x-show="newEntry.isLocked" x-transition>
                            <input x-model="newEntry.pin" type="password" maxlength="4" placeholder="4-Digit PIN" class="w-full bg-red-950/10 border border-red-900/30 rounded-xl px-5 py-3 text-center text-sm font-black tracking-[1.5em] text-red-400 focus:outline-none focus:border-red-500">
                        </div>

                        <input x-model="newEntry.tag" type="text" placeholder="TAGS (e.g. SYSTEM, CSS)" class="w-full bg-neutral-900/30 border border-neutral-800 rounded-xl px-5 py-3 text-[10px] font-black uppercase tracking-widest focus:outline-none focus:border-cyan-500">
                        
                        <div class="relative group">
                            <textarea x-model="newEntry.content" rows="10" placeholder="Type, paste, or drag & drop file here..." class="w-full bg-neutral-900/30 border border-neutral-800 rounded-2xl p-6 text-sm code-font focus:outline-none focus:border-neutral-600 transition-all custom-scrollbar"></textarea>
                            <span class="absolute bottom-4 right-4 text-[9px] text-neutral-600 font-bold opacity-0 group-hover:opacity-100 transition-opacity">Drag .txt/.html supported</span>
                        </div>
                    </div>

                    <button @click="saveEntry()" class="w-full bg-white text-black py-4 rounded-2xl text-[10px] font-black tracking-[0.2em] hover:bg-cyan-400 hover:shadow-lg hover:shadow-cyan-500/20 transition-all uppercase">COMMIT ENTRY</button>
                </div>
            </aside>

            <section class="lg:col-span-8 space-y-6">
                <div class="flex flex-col md:flex-row gap-4 justify-between items-center bg-neutral-900/30 p-2 rounded-full border border-neutral-800">
                    <div class="relative flex-1 group pl-4">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-neutral-500"></i>
                        <input x-model="search" type="text" placeholder="Search archive..." class="w-full bg-transparent pl-8 py-2 text-sm font-medium focus:outline-none">
                    </div>
                    <div class="flex gap-2 text-[10px] font-black pr-2">
                        <button @click="filter = 'all'" :class="filter === 'all' ? 'bg-white text-black' : 'text-neutral-500'" class="px-6 py-2 rounded-full transition-all">ALL</button>
                        <button @click="filter = 'locked'" :class="filter === 'locked' ? 'bg-red-500 text-white' : 'text-neutral-500'" class="px-6 py-2 rounded-full transition-all"><i data-lucide="lock" class="w-3 h-3 inline pb-0.5"></i> SECURE</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <template x-for="s in filteredEntries" :key="s.id">
                        <div class="glass p-8 rounded-[2rem] relative overflow-hidden group hover:border-neutral-700 transition-all flex flex-col h-full animate__animated animate__fadeInUp">
                            <div class="flex justify-between items-center mb-6">
                                <span class="px-3 py-1 bg-neutral-900 text-[9px] font-black rounded-full text-neutral-400 border border-neutral-800 tracking-tighter uppercase" x-text="s.tag || 'GENERAL'"></span>
                                <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                                    <button @click="openFocus(s)" class="p-2 hover:bg-white/5 rounded-full text-neutral-500 hover:text-cyan-400"><i data-lucide="maximize-2" class="w-4 h-4"></i></button>
                                    <template x-if="s.type === 'code' && (!s.isLocked || s.isUnlocked)">
                                        <button @click="openPreview(s.content)" class="p-2 hover:bg-white/5 rounded-full text-neutral-500 hover:text-green-400"><i data-lucide="play" class="w-4 h-4"></i></button>
                                    </template>
                                    <button @click="shareEntry(s)" class="p-2 hover:bg-white/5 rounded-full text-neutral-500 hover:text-white"><i data-lucide="share-2" class="w-4 h-4"></i></button>
                                    <button @click="copyEntry(s)" class="p-2 hover:bg-white/5 rounded-full text-neutral-500 hover:text-white"><i data-lucide="copy" class="w-4 h-4"></i></button>
                                </div>
                            </div>

                            <h3 class="text-xl font-extrabold tracking-tight mb-4 group-hover:text-cyan-400 transition-colors" x-text="s.title"></h3>
                            
                            <div class="relative bg-black/60 border border-neutral-900 rounded-2xl p-6 mb-4 overflow-hidden flex-1 min-h-[120px]">
                                <template x-if="s.isLocked && !s.isUnlocked">
                                    <div class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-neutral-950/95 backdrop-blur-xl p-4">
                                        <i data-lucide="lock" class="w-6 h-6 text-red-500 mb-3"></i>
                                        <input type="password" maxlength="4" placeholder="PIN" @input="handleUnlock($event, s)" class="w-20 bg-transparent border-b border-red-500 text-center text-sm font-black tracking-widest focus:outline-none">
                                    </div>
                                </template>

                                <div class="max-h-40 overflow-y-auto custom-scrollbar">
                                    <template x-if="s.type === 'code'">
                                        <pre class="code-font text-xs text-neutral-400 leading-relaxed whitespace-pre-wrap" x-text="s.content"></pre>
                                    </template>
                                    <template x-if="s.type === 'text'">
                                        <div class="markdown-content text-sm leading-relaxed" x-html="marked.parse(s.content)"></div>
                                    </template>
                                </div>
                            </div>

                            <template x-if="(!s.isLocked || s.isUnlocked) && extractColors(s.content).length > 0">
                                <div class="flex flex-wrap gap-2 mb-4 p-3 bg-neutral-900/30 rounded-xl border border-neutral-800/50">
                                    <template x-for="color in extractColors(s.content).slice(0,5)">
                                        <div class="flex items-center gap-1.5">
                                            <div class="w-3 h-3 rounded-full border border-white/20" :style="`background-color: ${color}`"></div>
                                            <span class="text-[8px] font-mono text-neutral-500" x-text="color"></span>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <div class="flex justify-between items-center text-[9px] font-black text-neutral-600 tracking-[0.1em] uppercase mt-auto pt-2">
                                <div class="flex gap-4">
                                    <span class="flex items-center gap-1 hover:text-neutral-400 cursor-help" :title="s.type"><i :data-lucide="s.type==='code'?'terminal':'type'" class="w-3 h-3"></i></span>
                                    <span x-text="`${Math.ceil(s.content.length / 400)}M READ`"></span>
                                </div>
                                <div class="flex gap-3 items-center">
                                    <button @click="deleteEntry(s.id)" class="hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <div x-show="filteredEntries.length === 0" class="text-center py-32 border border-dashed border-neutral-800 rounded-[3rem] bg-neutral-900/10">
                    <p class="text-[10px] font-black text-neutral-600 uppercase tracking-[0.4em]">Archive is Empty</p>
                </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
